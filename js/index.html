<!DOCTYPE html>
<html lang="id">
<head>
   <meta charset="utf-8">
   <meta name="viewport" content="width=device-width, initial-scale=1">
   <title>404 - Halaman Tidak Ditemukan</title>
   
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
   
   <style>
      :root { --bs-primary: #1869A0; }
      body { 
         background-color: #f4f7f6; 
         height: 100vh;
         display: flex;
         align-items: center;
         justify-content: center;
         font-family: sans-serif;
      }
      .error-template {
         text-align: center;
         padding: 40px;
         background: #fff;
         border-radius: 20px;
         box-shadow: 0 10px 30px rgba(0,0,0,0.05);
         max-width: 500px;
         width: 90%;
      }
      .error-icon {
         font-size: 5rem;
         color: var(--bs-primary);
         margin-bottom: 20px;
      }
      .btn-primary {
         background: var(--bs-primary);
         border: none;
      }
   </style>
</head>
<body>

   <div class="error-template border-0">
      <i class="bi bi-shield-lock-fill error-icon"></i>
      <h1 class="fw-bold text-dark mb-2">404 Not Found</h1>
      <h5 class="text-secondary mb-4">Akses Ditolak / Halaman Tidak Ditemukan</h5>
      <p class="text-muted mb-4 small">
         Maaf, direktori atau halaman yang Anda coba akses tidak tersedia, telah dipindahkan, atau Anda tidak memiliki izin untuk melihatnya.
      </p>
      <a href="/" class="btn btn-primary rounded-pill px-4 py-2 fw-bold shadow-sm">
         <i class="bi bi-house-door-fill me-2"></i> Kembali ke Beranda
      </a>
   </div>

</body>
</html>
