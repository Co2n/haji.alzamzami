<!DOCTYPE html>
<html lang="id">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Validasi Dokumen Resmi</title>
   <style>
      body {
         font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
         background-color: #f4f6f9;
         display: flex;
         justify-content: center;
         align-items: center;
         min-height: 100vh;
         margin: 0;
         padding: 20px;
      }

      .card {
         background: white;
         width: 100%;
         max-width: 500px;
         padding: 40px;
         border-radius: 12px;
         box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
         text-align: center;
         border-top: 5px solid #2563eb;
         /* Warna brand */
      }

      .logo {
         width: 300px;
         height: auto;
         margin-bottom: 20px;
      }

      h2 {
         color: #333;
         margin-bottom: 5px;
      }

      .status-badge {
         display: inline-block;
         padding: 5px 15px;
         border-radius: 50px;
         font-size: 14px;
         font-weight: bold;
         margin-bottom: 25px;
         text-transform: uppercase;
         letter-spacing: 1px;
      }

      .valid {
         background-color: #d1fae5;
         color: #065f46;
         border: 1px solid #065f46;
      }

      .invalid {
         background-color: #fee2e2;
         color: #991b1b;
         border: 1px solid #991b1b;
      }

      .loading {
         background-color: #e0f2fe;
         color: #075985;
      }

      .info-table {
         width: 100%;
         text-align: left;
         margin-top: 20px;
         border-collapse: collapse;
      }

      .info-table th {
         font-size: 12px;
         color: #6b7280;
         text-transform: uppercase;
         padding: 8px 0;
         width: 40%;
         vertical-align: top;
      }

      .info-table td {
         font-size: 15px;
         color: #111827;
         font-weight: 500;
         padding: 8px 0;
         padding-left: 10px;
         border-bottom: 1px solid #f3f4f6;
      }

      .info-table tr:last-child td {
         border-bottom: none;
      }

      .footer {
         margin-top: 30px;
         font-size: 12px;
         color: #9ca3af;
      }

      #error-msg {
         color: red;
         display: none;
         margin-top: 20px;
      }

      #content-area {
         display: none;
         /* Sembunyikan sampai data dimuat */
      }
   </style>
</head>

   <script>
      const copyrightYearEl = document.getElementById('copyrightYear');
      if (copyrightYearEl) copyrightYearEl.textContent = new Date().getFullYear();
      // --- KONFIGURASI ---
      // MASUKKAN URL DEPLOYMENT APPS SCRIPT DI SINI
      const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwjE3Sb6IN9bPhkVU0JSVgCFqDbilr2JdC5F4hBay15M_1gRm0_mOJ3FzDhWOmmeB6Gaw/exec';

      // -------------------

      document.addEventListener('DOMContentLoaded', function () {
         const urlParams = new URLSearchParams(window.location.search);
         const docId = urlParams.get('id');

         const loadingEl = document.getElementById('loading-status');
         const contentEl = document.getElementById('content-area');
         const errorEl = document.getElementById('error-msg');

         if (!docId) {
            loadingEl.style.display = 'none';
            errorEl.style.display = 'block';
            return;
         }

         // Fetch data dari Google Script
         fetch(SCRIPT_URL + '?id=' + docId)
            .then(response => response.json())
            .then(result => {
               loadingEl.style.display = 'none';

               if (result.status === 'success') {
                  // Isi data ke HTML
                  document.getElementById('d-jenis').textContent = result.data.jenis_dokumen;
                  document.getElementById('d-nomor').textContent = result.data.nomor_dokumen;
                  document.getElementById('d-tanggal').textContent = result.data.tgl_dok;
                  document.getElementById('d-perihal').textContent = result.data.perihal;
                  document.getElementById('d-untuk').textContent = result.data.untuk;
                  document.getElementById('d-pejabat').textContent = result.data.pejabat;

                  // Tampilkan konten
                  contentEl.style.display = 'block';
               } else {
                  // Tampilkan error jika ID tidak ketemu di sheet
                  errorEl.style.display = 'block';
               }
            })
            .catch(error => {
               console.error('Error:', error);
               loadingEl.style.display = 'none';
               errorEl.innerHTML = '<div class="status-badge invalid">Kesalahan Jaringan</div><p>Gagal menghubungi server.</p>';
               errorEl.style.display = 'block';
            });
      });
   </script>
