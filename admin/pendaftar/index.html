   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
   <style>

      /* Tambahan CSS Khusus Admin */
      .admin-container { max-width: 800px; margin: auto; }
      body { background-color: #f4f7f6; }
   </style>
   <script>
      /**
       * Memaksa penghapusan cookies setiap kali halaman dimuat
       */
      function clearCookies() {
         const cookies = document.cookie.split(";");
         for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i];
            const eqPos = cookie.indexOf("=");
            const name = eqPos > -1 ? cookie.substring(0, eqPos) : cookie;
            // Set masa berlaku ke masa lalu agar terhapus
            document.cookie = name + "=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/";
         }
      }
      clearCookies();
   </script>
</head>

<body data-bs-spy="scroll" data-bs-target="#menuUtama" data-bs-root-margin="0px 0px -40%" data-bs-smooth-scroll="true" tabindex="0">

   <!-- HEADER FIXED -->
   <div class="sticky-top bg-white p-3 mb-4 shadow-sm rounded-bottom-4 z-3" style="top: -1px;">
      <div class="container admin-container d-flex justify-content-between align-items-center flex-wrap gap-3">
         <h4 class="fw-bold text-primary mb-0">
            <i class="bi bi-people-fill me-2"></i>Data Pendaftaran
         </h4>
         <button onclick="loadDataPendaftaran()" class="btn btn-outline-primary rounded-pill px-4 shadow-sm fw-bold">
            <i class="bi bi-arrow-clockwise me-1"></i> Refresh
         </button>
      </div>
   </div>

   <!-- KOTAK UTAMA (CONTAINER DATA) -->
   <div class="container py-2 admin-container">
      <div id="listPendaftarContainer">
         <!-- Spinner Loading Awal -->
         <div class="text-center py-5">
            <div class="spinner-border text-primary spinner-border-sm me-2"></div>Memuat data jamaah...
         </div>
      </div>
   </div>

   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
   
   <script>
      // ==========================================
      // URL API GOOGLE APPS SCRIPT
      // ==========================================
      const apiURL = 'https://script.google.com/macros/s/AKfycbwzlDMpcMBVZtCEEDXRE6QnXL2odLfSVTCFlZ07MGOeHCpLP0qL4jNKxP_hLsJ44kPV/exec';

      // ==========================================
      // FUNGSI COPY TO CLIPBOARD (NO PORSI)
      // ==========================================
      function salinPorsi(teks, btnElement) {
         if (!teks || teks === '-') return;
         
         // API bawaan browser untuk menyalin teks
         navigator.clipboard.writeText(teks).then(() => {
            // Simpan ikon awal
            let iconAwal = btnElement.innerHTML;
            
            // Ubah tampilan tombol menjadi sukses (Ceklis)
            btnElement.innerHTML = '<i class="bi bi-check2-all"></i>';
            btnElement.classList.replace('btn-outline-warning', 'btn-success');
            btnElement.classList.add('text-white');
            
            // Kembalikan ke tampilan semula setelah 2 detik
            setTimeout(() => {
               btnElement.innerHTML = iconAwal;
               btnElement.classList.replace('btn-success', 'btn-outline-warning');
               btnElement.classList.remove('text-white');
            }, 2000);
         }).catch(err => {
            alert('Gagal menyalin No Porsi: ' + err);
         });
      }

      async function loadDataPendaftaran() {
         const container = document.getElementById('listPendaftarContainer');
         
         // Memunculkan Loading saat tombol Refresh ditekan
         container.innerHTML = `
            <div class="text-center py-5">
               <div class="spinner-border text-primary spinner-border-sm me-2"></div>Mensinkronkan data...
            </div>`;

         try {
            const response = await fetch(apiURL, { redirect: "follow" });
            const data = await response.json();

            container.innerHTML = ''; // Kosongkan wadah

            if (!data || data.length === 0) {
               container.innerHTML = '<div class="text-center py-5 text-muted bg-white rounded-4 shadow-sm border-0">Belum ada data pendaftar.</div>';
               return;
            }

            // Membalik urutan agar pendaftar terbaru muncul paling atas
            const dataTerbaru = data.reverse();

            dataTerbaru.forEach((item, index) => {
               // 1. FORMAT TANGGAL
               let tglTampil = "-";
               if (item.TANGGAL) {
                  let d = new Date(item.TANGGAL);
                  if(!isNaN(d)) {
                     tglTampil = d.toLocaleDateString('id-ID', { 
                        weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' 
                     });
                  } else {
                     tglTampil = item.TANGGAL;
                  }
               }

               // 2. FORMAT NAMA & TAHUN (MODIFIKASI BARU)
               let namaKapital = item.NAMA ? item.NAMA.toUpperCase() : "TANPA NAMA";
               let teksTahun = item.TAHUN ? `(${item.TAHUN})` : ""; // Menangkap nilai tahun dan membungkusnya dengan kurung

               // 3. FORMAT NOMOR HP & LINK WHATSAPP
               let noHpAsli = item.HP ? item.HP.toString().trim() : "";
               let linkWA = "#";
               let htmlTombolWA = "";

               if (noHpAsli !== "") {
                  let waNumber = noHpAsli;
                  
                  // LOGIKA PINTAR FORMAT NOMOR WA
                  if (waNumber.startsWith("8")) {
                     waNumber = "62" + waNumber;
                  } else if (waNumber.startsWith("0")) {
                     waNumber = "62" + waNumber.substring(1);
                  } else if (waNumber.startsWith("+62")) {
                     waNumber = "62" + waNumber.substring(3);
                  } else if (waNumber.startsWith("62")) {
                     waNumber = waNumber;
                  } else {
                     waNumber = waNumber.replace(/\D/g,'');
                  }
                  
                  const pesanText = encodeURIComponent("Assalamualaikum, Terimakasih telah bergabung di KBIHU AL-ZAMZAMI");
                  linkWA = `https://wa.me/${waNumber}?text=${pesanText}`;

                  htmlTombolWA = `
                     <a href="${linkWA}" target="_blank" class="btn btn-sm btn-success rounded-pill px-4 fw-bold shadow-sm">
                        <i class="bi bi-whatsapp me-2"></i> Hubungi Jamaah
                     </a>
                  `;
               } else {
                  htmlTombolWA = `
                     <button class="btn btn-sm btn-secondary rounded-pill px-4 fw-bold shadow-sm" disabled>
                        <i class="bi bi-whatsapp me-2"></i> HP Kosong
                     </button>
                  `;
               }

               // 4. LOGIKA TOMBOL SALIN PORSI
               let tombolSalinPorsi = "";
               if (item.PORSI && item.PORSI.toString().trim() !== "") {
                  tombolSalinPorsi = `
                     <button onclick="salinPorsi('${item.PORSI}', this)" class="btn btn-sm btn-outline-warning rounded-circle shadow-sm d-flex align-items-center justify-content-center" style="width:32px; height:32px;" title="Salin No. Porsi">
                        <i class="bi bi-copy"></i>
                     </button>
                  `;
               }

               // 5. LOGIKA TOMBOL LINK REFERRAL AGEN
               let htmlReferral = `<i class="bi bi-person-badge-fill text-info me-2"></i><strong>Referral:</strong> ${item.REFERRAL || '-'}`;
               if (item.REFERRAL && item.REFERRAL.toString().trim() !== "") {
                  htmlReferral += `
                     <a href="../../agen/?ref=${item.REFERRAL}" target="_blank" class="btn btn-sm btn-outline-info rounded-pill py-0 px-2 ms-2 shadow-sm" style="font-size: 0.75rem;">
                        <i class="bi bi-box-arrow-up-right me-1"></i> Buka Halaman Agen
                     </a>
                  `;
               }

               // 6. PENYUSUNAN KARTU (CARD HTML)
               const cardHTML = `
               <div class="card mb-4 border-0 shadow-sm rounded-4">
                  <div class="card-body p-4">
                     
                     <!-- Header Card (Tanggal & Porsi + Tombol Salin) -->
                     <div class="d-flex justify-content-between align-items-center mb-3 pb-3 border-bottom flex-wrap gap-2">
                        <span class="text-primary fw-bold small">
                           <i class="bi bi-calendar-check me-2"></i>${tglTampil}
                        </span>
                        
                        <div class="d-flex align-items-center gap-2">
                           <span class="badge bg-warning rounded-pill px-3 py-2 text-white shadow-sm">
                              No. Porsi: ${item.PORSI || '-'}
                           </span>
                           ${tombolSalinPorsi}
                        </div>
                     </div>

                     <!-- Info Utama (Nama & Tahun) -->
                     <h4 class="fw-bold text-dark mb-3">
                        ${namaKapital} 
                        <span class="text-muted fw-normal" style="font-size: 1.1rem;">${teksTahun}</span>
                     </h4>

                     <!-- Grid Info Detail -->
                     <div class="row g-3 mb-4">
                        <div class="col-12 text-muted small">
                           <div class="d-flex align-items-start">
                              <i class="bi bi-geo-alt-fill text-danger me-2 mt-1"></i>
                              <div>
                                 <strong>Alamat:</strong><br>
                                 ${item.ALAMAT || '-'}, Ds. ${item.DESA || '-'}, Kec. ${item.KECAMATAN || '-'}
                              </div>
                           </div>
                        </div>
                        
                        <!-- Referral + Tombol Agen -->
                        <div class="col-12 text-muted small d-flex align-items-center flex-wrap">
                           ${htmlReferral}
                        </div>
                     </div>

                     <!-- Footer Card (Tombol WhatsApp) -->
                     <div class="bg-light p-3 rounded-4 d-flex justify-content-between align-items-center flex-wrap gap-2">
                        <div class="small fw-bold text-secondary">
                           <i class="bi bi-telephone-fill me-1"></i> ${noHpAsli || 'Kosong'}
                        </div>
                        ${htmlTombolWA}
                     </div>

                  </div>
               </div>
               `;

               container.innerHTML += cardHTML;
            });

         } catch (error) {
            container.innerHTML = `
               <div class="text-center py-4 text-danger bg-white rounded-4 shadow-sm border-0">
                  <i class="bi bi-exclamation-triangle-fill me-2"></i> Gagal mengambil data: ${error.message}
               </div>`;
         }
      }

      // Panggil fungsi saat halaman pertama kali dibuka
      document.addEventListener('DOMContentLoaded', loadDataPendaftaran);

   </script>
</body>
