<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    :root {
      --bs-primary: #1869A0;
    }
    body {
      background: #f4f7f6;
      font-family: sans-serif;
    }
    .bg-primary {
      background: var(--bs-primary) !important;
    }
    .btn-primary {
      background: var(--bs-primary);
      border: none;
    }
    /* Membatasi lebar maksimal container agar tidak terlalu lebar di layar laptop/PC */
    .admin-container {
      max-width: 800px;
      margin: auto;
    }
  </style>
  <script>
    function clearCookies() {
      const cookies = document.cookie.split(";");
      for (let i = 0; i < cookies.length; i++) {
        const cookie = cookies[i];
        const eqPos = cookie.indexOf("=");
        const name = eqPos > -1 ? cookie.substring(0, eqPos) : cookie;
        document.cookie = name + "=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/";
      }
    }
    clearCookies();
  </script>
</head>

<body>

  <div class="container py-4 admin-container">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
      <h4 class="fw-bold text-primary mb-0"><i class="bi bi-calendar-event-fill me-2"></i>Admin Kegiatan</h4>
      <div class="d-flex gap-2">
        <button onclick="tutupHalaman()" class="btn btn-outline-danger rounded-pill px-4 shadow-sm fw-bold">
          <i class="bi bi-box-arrow-left me-1"></i> Keluar
        </button>
        <button class="btn btn-primary rounded-pill px-4 shadow-sm fw-bold" data-bs-toggle="modal" data-bs-target="#modalTambah">
          <i class="bi bi-plus-lg me-1"></i> Tambah
        </button>
      </div>
    </div>

    <!-- WADAH LIST KEGIATAN BARU (Bukan Tabel) -->
    <div id="listDataContainer">
      <div class="text-center py-5">
        <div class="spinner-border text-primary spinner-border-sm me-2"></div>Memuat data...
      </div>
    </div>
  </div>

  <!-- MODAL TAMBAH -->
  <div class="modal fade" id="modalTambah" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content rounded-4 border-0 shadow">
        <div class="modal-header border-0 pb-0">
          <h5 class="fw-bold">Input Kegiatan</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="formTambah">
            <div class="mb-3">
              <label class="small fw-bold">Tanggal</label>
              <input type="date" name="tanggal" class="form-control" required>
            </div>
            <div class="row mb-3">
              <div class="col-6">
                <label class="small fw-bold">Mulai</label>
                <input type="text" name="waktuMulai" class="form-control" placeholder="14:00 WIB atau WAS" required>
              </div>
              <div class="col-6">
                <label class="small fw-bold">Selesai</label>
                <input type="text" name="waktuSelesai" class="form-control" placeholder="18:00 WIB" required>
              </div>
            </div>
            <div class="mb-3">
              <label class="small fw-bold">Nama Kegiatan</label>
              <input type="text" name="nama" class="form-control" placeholder="Contoh: City Tour Madinah" required>
            </div>
            <div class="mb-4">
              <label class="small fw-bold">Destinasi</label>
              <textarea name="destinasi" class="form-control" rows="2" required></textarea>
            </div>
            <div class="mb-4">
              <label class="small fw-bold">Tampilkan Galeri di Halaman Utama?</label>
              <select name="tampilkanGaleri" class="form-select" required>
                <option value="Ya">Ya</option>
                <option value="Tidak" selected>Tidak</option>
              </select>
            </div>
            <button type="submit" id="btnSimpan" class="btn btn-primary w-100 rounded-pill fw-bold">Simpan & Buat Folder</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL EDIT -->
  <div class="modal fade" id="modalEdit" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content rounded-4 border-0 shadow">
        <div class="modal-header border-0 pb-0">
          <h5 class="fw-bold text-primary">Edit Kegiatan</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="formEdit">
            <input type="hidden" id="editRowId">

            <div class="mb-3">
              <label class="small fw-bold">Tanggal</label>
              <input type="date" id="editTanggal" class="form-control" required>
            </div>
            <div class="row mb-3">
              <div class="col-6">
                <label class="small fw-bold">Mulai</label>
                <input type="text" id="editWaktuMulai" name="waktuMulai" class="form-control" placeholder="14:00 WIB atau WAS" required>
              </div>
              <div class="col-6">
                <label class="small fw-bold">Selesai</label>
                <input type="text" id="editWaktuSelesai" name="waktuSelesai" class="form-control" placeholder="18:00 WIB" required>
              </div>
            </div>
            <div class="mb-3">
              <label class="small fw-bold">Nama Kegiatan</label>
              <input type="text" id="editNama" class="form-control" required>
            </div>
            <div class="mb-4">
              <label class="small fw-bold">Destinasi</label>
              <textarea id="editDestinasi" class="form-control" rows="2" required></textarea>
            </div>
            <div class="mb-4">
              <label class="small fw-bold">Tampilkan Galeri di Halaman Utama?</label>
              <select id="editTampilkanGaleri" class="form-select" required>
                <option value="Ya">Ya</option>
                <option value="Tidak">Tidak</option>
              </select>
            </div>
            <button type="submit" id="btnUpdate" class="btn btn-primary w-100 rounded-pill fw-bold">Update Data</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // ==========================================
    // GANTI DENGAN URL WEB APP GOOGLE APPS SCRIPT ANDA
    // ==========================================
    const gasWebAppUrl = 'https://script.google.com/macros/s/AKfycbzEMLcsUAbkZD6mpGfOPbY0T7DA3t4xbRgrtPZObfuvMrSQ7YIpnqJ-dRFEzICZ1nUn/exec';

    let dataKegiatanGlobal = [];

    // ==========================================
    // 1. LOAD DATA AWAL (DIUBAH MENJADI RENDER CARD)
    // ==========================================
    async function loadData() {
      const container = document.getElementById('listDataContainer');
      container.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary spinner-border-sm me-2"></div>Memuat data...</div>';

      try {
        const response = await fetch(gasWebAppUrl + '?getJson=1', { redirect: "follow" });
        const data = await response.json();

        container.innerHTML = '';
        dataKegiatanGlobal = data;

        if (!data || data.length === 0) {
          container.innerHTML = '<div class="text-center py-5 text-muted bg-white rounded-4 shadow-sm border-0">Belum ada kegiatan yang diinput.</div>';
          return;
        }

        data.forEach(item => {
          let tglTampil = "-";
          if (item.tanggal && item.tanggal.includes('-')) {
            const p = item.tanggal.split('-');
            tglTampil = `${p[2]}/${p[1]}/${p[0]}`;
          }

          // Konfigurasi ikon mata (Tampilkan Galeri)
          const iconGaleri = item.tampilkanGaleri === 'Ya' 
            ? '<i class="bi bi-eye-fill text-success fs-5 ms-2" title="Galeri Tampil di Publik"></i>' 
            : '<i class="bi bi-eye-slash-fill text-secondary fs-5 ms-2" title="Galeri Disembunyikan"></i>';

          // Render HTML menggunakan Card Bootstrap
          container.innerHTML += `
          <div class="card mb-3 border-0 shadow-sm rounded-4">
            <div class="card-body p-3 p-md-4">
              
              <!-- Header Card (Tanggal & Tombol Aksi) -->
              <div class="d-flex justify-content-between align-items-center mb-3 pb-2 border-bottom">
                <span class="badge bg-primary bg-opacity-10 px-3 py-2 fs-6 rounded-pill">
                  <i class="bi bi-calendar-event me-1"></i> ${tglTampil}
                </span>
                <div class="d-flex gap-1">
                  <button onclick="bukaModalEdit(${item.rowId})" class="btn btn-sm btn-light text-primary rounded-circle shadow-sm" style="width:35px; height:35px;" title="Edit">
                    <i class="bi bi-pencil-square"></i>
                  </button>
                  <button onclick="hapusData(${item.rowId})" class="btn btn-sm btn-light text-danger rounded-circle shadow-sm" style="width:35px; height:35px;" title="Hapus">
                    <i class="bi bi-trash3-fill"></i>
                  </button>
                </div>
              </div>

              <!-- Konten Card (Kegiatan, Waktu, Destinasi) -->
              <div class="mb-3">
                <h5 class="fw-bold text-dark mb-1">${item.nama}</h5>
                <p class="text-muted small mb-1"><i class="bi bi-geo-alt-fill text-danger me-1"></i> ${item.destinasi}</p>
                <p class="text-muted small mb-0"><i class="bi bi-clock-fill text-warning me-1"></i> ${item.waktuMulai} - ${item.waktuSelesai}</p>
              </div>

              <!-- Footer Card (Tombol Galeri & Status Mata) -->
              <div class="d-flex justify-content-between align-items-center bg-light rounded-3 p-2 px-3">
                <a href="${item.linkGaleri}" target="_blank" class="btn btn-sm btn-primary rounded-pill px-3 fw-bold">
                  <i class="bi bi-folder2-open me-1"></i> Buka Drive
                </a>
                <div class="d-flex align-items-center">
                  <span class="small fw-bold text-muted d-none d-sm-inline">Status Utama:</span> ${iconGaleri}
                </div>
              </div>

            </div>
          </div>`;
        });
      } catch (error) {
        container.innerHTML = `<div class="text-center py-4 text-danger bg-white rounded-4 shadow-sm border-0"><i class="bi bi-exclamation-triangle-fill me-2"></i> Gagal memuat data: ${error.message}</div>`;
      }
    }

    // ==========================================
    // BUKA MODAL EDIT 
    // ==========================================
    function bukaModalEdit(rowId) {
      const item = dataKegiatanGlobal.find(d => d.rowId === rowId);
      if (item) {
        document.getElementById('editRowId').value = item.rowId;
        document.getElementById('editTanggal').value = item.tanggal;
        document.getElementById('editWaktuMulai').value = item.waktuMulai;
        document.getElementById('editWaktuSelesai').value = item.waktuSelesai;
        document.getElementById('editNama').value = item.nama;
        document.getElementById('editDestinasi').value = item.destinasi;
        document.getElementById('editTampilkanGaleri').value = item.tampilkanGaleri || 'Tidak';

        const modal = new bootstrap.Modal(document.getElementById('modalEdit'));
        modal.show();
      }
    }

    // ==========================================
    // 2. PROSES SIMPAN EDIT (UPDATE)
    // ==========================================
    document.getElementById('formEdit').addEventListener('submit', async function (e) {
      e.preventDefault();
      const btn = document.getElementById('btnUpdate');
      btn.disabled = true; btn.innerText = "Menyimpan...";

      const formData = {
        rowId: document.getElementById('editRowId').value,
        tanggal: document.getElementById('editTanggal').value,
        waktuMulai: document.getElementById('editWaktuMulai').value,
        waktuSelesai: document.getElementById('editWaktuSelesai').value,
        nama: document.getElementById('editNama').value,
        destinasi: document.getElementById('editDestinasi').value,
        tampilkanGaleri: document.getElementById('editTampilkanGaleri').value
      };

      try {
        const response = await fetch(gasWebAppUrl, {
          method: 'POST',
          body: JSON.stringify({ action: "edit", data: formData })
        });
        const result = await response.json();

        if (result.status === "success") {
          alert("Alhamdulillah, Data berhasil diperbarui!");
          bootstrap.Modal.getInstance(document.getElementById('modalEdit')).hide();
          loadData();
        } else {
          throw new Error(result.message);
        }
      } catch (err) {
        alert("Gagal update data: " + err.message);
      } finally {
        btn.disabled = false; btn.innerText = "Update Data";
      }
    });

    // ==========================================
    // 3. PROSES TAMBAH DATA (CREATE)
    // ==========================================
    document.getElementById('formTambah').addEventListener('submit', async function (e) {
      e.preventDefault();
      const btn = document.getElementById('btnSimpan');
      btn.disabled = true; btn.innerText = "Memproses...";

      const formData = {
        tanggal: this.tanggal.value,
        waktuMulai: this.waktuMulai.value,
        waktuSelesai: this.waktuSelesai.value,
        nama: this.nama.value,
        destinasi: this.destinasi.value,
        tampilkanGaleri: this.tampilkanGaleri.value
      };

      try {
        const response = await fetch(gasWebAppUrl, {
          method: 'POST',
          body: JSON.stringify({ action: "tambah", data: formData })
        });
        const result = await response.json();

        if (result.status === "success") {
          alert("Berhasil! Folder Drive otomatis dibuat & data tersimpan.");
          document.getElementById('formTambah').reset();
          bootstrap.Modal.getInstance(document.getElementById('modalTambah')).hide();
          loadData();
        } else {
          throw new Error(result.message);
        }
      } catch (err) {
        alert("Gagal menyimpan: " + err.message);
      } finally {
        btn.disabled = false; btn.innerText = "Simpan & Buat Folder";
      }
    });

    // ==========================================
    // 4. PROSES HAPUS DATA (DELETE)
    // ==========================================
    async function hapusData(id) {
      if (confirm("Yakin ingin menghapus data ini?")) {
        try {
          const response = await fetch(gasWebAppUrl, {
            method: 'POST',
            body: JSON.stringify({ action: "hapus", rowId: id })
          });
          const result = await response.json();

          if (result.status === "success") {
            loadData();
          } else {
            throw new Error(result.message);
          }
        } catch (err) {
          alert("Gagal menghapus: " + err.message);
        }
      }
    }

    // Muat data pertama kali
    window.onload = loadData;

    // ==========================================
    // FUNGSI TUTUP HALAMAN / KELUAR
    // ==========================================
    function tutupHalaman() {
      window.location.href = "../../";
    }
  </script>

</body>

</html>
